<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080d16" />
    <title>Offline - Games & PoE</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #080d16;
        color: #edf4ff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(37, 192, 141, 0.16), transparent 32rem),
          linear-gradient(135deg, #080d16, #101722 55%, #0a0f18);
      }

      main {
        width: min(90vw, 34rem);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 0.5rem;
        background: rgba(15, 23, 34, 0.92);
        padding: 1.5rem;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: #a9b5c5;
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Brak połączenia</h1>
      <p>Aplikacja jest zainstalowana, ale dane z backendu wymagają połączenia z prywatnym serwerem albo VPN.</p>
    </main>
  </body>
</html>
