services:
  postgres:
    image: postgres:16-alpine
    container_name: games_poe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: games_app
      POSTGRES_USER: games
      POSTGRES_PASSWORD: games
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U games -d games_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

